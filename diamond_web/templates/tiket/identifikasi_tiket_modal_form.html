{% load crispy_forms_tags %}
<form method="post" action="{{ form_action }}">
    {% csrf_token %}
    <div class="modal-body">
        <div class="alert alert-info">
            <i class="ri-information-line me-2"></i>
            <strong>Proses Identifikasi:</strong> Masukkan tanggal rekam PIDE untuk tiket <strong>{{ tiket.nomor_tiket }}</strong>.
        </div>

        <div class="mb-3">
            {{ form.tgl_rekam_pide.label_tag }}
            {{ form.tgl_rekam_pide }}
            {% if form.tgl_rekam_pide.errors %}
            <div class="text-danger">{{ form.tgl_rekam_pide.errors }}</div>
            {% endif %}
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
        <button type="submit" class="btn btn-info">Identifikasi</button>
    </div>
</form>
