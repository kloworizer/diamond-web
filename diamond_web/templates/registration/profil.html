{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Profil - Diamond Web{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-header-left d-flex align-items-center">
        <div class="page-header-title">
            <h5 class="m-b-10"><i class="feather-user me-2"></i>Profil</h5>
        </div>
        <ul class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
            <li class="breadcrumb-item active">Profil</li>
        </ul>
    </div>
    <div class="page-header-right ms-auto d-flex d-lg-none">
        <a href="javascript:void(0)" class="text-dark">
            <i class="feather-menu"></i>
        </a>
    </div>
</div>

<div class="main-content">
    <div class="card stretch stretch-full h-100">
        <div class="card-header">
            <h5 class="card-title mb-0"><i class="feather-edit me-2"></i>Update Profil & Password</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-grid gap-2 mt-3">
                    <button type="submit" class="btn btn-primary">Simpan Perubahan</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
