{% extends "base.html" %}

{% block title %}Monitoring Dashboard{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h2 class="mb-1">
                        <i class="ri-dashboard-2-line me-2"></i>Monitoring Dashboard
                    </h2>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-0">
                            <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
                            <li class="breadcrumb-item active">Monitoring Dashboard</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="ri-bar-chart-2-line me-2"></i>DDE - Monitoring Tiket</h5>
        </div>
        <div class="card-body p-0">
            <iframe 
                title="DDE - Mon Tiket New" 
                width="100%" 
                height="800" 
                src="{{ powerbi_url }}" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </div>
</div>

<style>
    iframe {
        border: none;
        display: block;
    }
</style>
{% endblock %}
